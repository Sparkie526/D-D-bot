name: ci

on:
  push:
    branches:
      - main
      - readme-only
  pull_request:

jobs:
  install-and-require:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - run: npm ci --include=optional

      - run: npm run check
