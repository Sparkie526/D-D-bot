name: ci

on:
  push:
    branches:
      - main
      - readme-only
  pull_request:

jobs:
  install-and-require:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - run: npm ci --include=optional

      - run: npm run check
