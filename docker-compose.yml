services:
  ollama:
    # Disabled by default. Enable with: docker compose --profile ollama up
    profiles: ["ollama"]
    # Pin to avoid surprise regressions from :latest.
    image: ollama/ollama:0.20.5
    environment:
      # Keep the queue small so the bot can't accidentally pile up work.
      # Flash attention: leave enabled for better CPU perf.
      OLLAMA_FLASH_ATTENTION: "true"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_QUEUE: "16"
      OLLAMA_KEEP_ALIVE: "1m"
    volumes:
      - ollama:/root/.ollama
    # No host port published by default. The bot talks to Ollama over the
    # compose network at http://ollama:11434.
    # If you want to reach Ollama from your host, add a ports mapping.

  bot:
    build: .
    # Create this file from .env.example.
    env_file:
      - .env
    environment: {}
    volumes:
      # Optional: edit world notes without rebuilding.
      - ./world_notes.txt:/app/world_notes.txt:ro
    extra_hosts:
      # Allows OLLAMA_URL=http://host.docker.internal:11434/api/chat on Linux.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  ollama:
