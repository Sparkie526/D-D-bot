services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    # No host port published by default. The bot talks to Ollama over the
    # compose network at http://ollama:11434.
    # If you want to reach Ollama from your host, add a ports mapping.

  bot:
    build: .
    depends_on:
      - ollama
    # Create this file from .env.example.
    env_file:
      - .env
    environment: {}
    volumes:
      # Optional: edit world notes without rebuilding.
      - ./world_notes.txt:/app/world_notes.txt:ro
    extra_hosts:
      # Allows OLLAMA_URL=http://host.docker.internal:11434/api/chat on Linux.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  ollama:
